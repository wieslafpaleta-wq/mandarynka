<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Champion">
  <meta name="theme-color" content="#0d0008">
  <meta name="description" content="Twoja codzienna aplikacja do samorozwoju">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <title>Champion ⚡</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="xp-floats"></div>
<div id="burst-container"></div>
<div id="win-toast"></div>

<div id="app">
  <div id="header-card"></div>
  <div id="tab-today"   class="tab-content active"></div>
  <div id="tab-week"    class="tab-content"></div>
  <div id="tab-quests"  class="tab-content"></div>
  <div id="tab-goals"   class="tab-content"></div>
  <div id="tab-cooking" class="tab-content"></div>
  <div id="tab-finance" class="tab-content"></div>
  <div id="tab-history" class="tab-content"></div>
  <div id="tab-level"   class="tab-content"></div>
</div>

<nav id="bottom-nav">
  <button class="nav-btn active" data-tab="today" onclick="switchTab('today')">
    <span class="nav-icon">⚡</span>
    <span class="nav-label">Dziś</span>
  </button>
  <button class="nav-btn" data-tab="quests" onclick="switchTab('quests')">
    <span class="nav-icon">🎲</span>
    <span class="nav-label">Questy</span>
  </button>
  <button class="nav-btn" data-tab="goals" onclick="switchTab('goals')">
    <span class="nav-icon">🎯</span>
    <span class="nav-label">Cele</span>
  </button>
  <button class="nav-btn" data-tab="cooking" onclick="switchTab('cooking')">
    <span class="nav-icon">🥗</span>
    <span class="nav-label">Przepisy</span>
  </button>
  <button class="nav-btn" data-tab="finance" onclick="switchTab('finance')">
    <span class="nav-icon">💰</span>
    <span class="nav-label">Kasa</span>
  </button>
  <button class="nav-btn" data-tab="level" onclick="switchTab('level')">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Postępy</span>
  </button>
</nav>

<script src="ai-coach.js"></script>
<script src="quest-answers.js"></script>
<script src="app.js"></script>
</body>
</html>
